        shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        update() {
        }
    }

    class MenuScene extends Phaser.Scene {
        constructor() {
            super({ key: 'MenuScene' });
        }

        create() {
            const bg = this.add.graphics();
            bg.fillStyle(0x0f0f23, 1);
            bg.fillRect(0, 0, 800, 600);

            bg.lineStyle(1, 0x1a1a3e, 0.5);
            for (let i = 0; i < 800; i += 50) {
                bg.moveTo(i, 0);
                bg.lineTo(i, 600);
            }
            for (let i = 0; i < 600; i += 50) {
                bg.moveTo(0, i);
                bg.lineTo(800, i);
            }
            bg.strokePath();

            const title = this.add.text(400, 150, '♚ CHESS ROGUE', {
                fontSize: '52px',
                color: '#e94560',
                fontFamily: 'Courier New',
                fontStyle: 'bold',
                stroke: '#000000',
                strokeThickness: 6
            }).setOrigin(0.5);

            this.add.text(400, 210, 'Deck Building + Xadrez', {
                fontSize: '18px',
                color: '#4ecca3',
                fontFamily: 'Courier New'
            }).setOrigin(0.5);

            const pieces = ['♜', '♞', '♝', '♛', '♟'];
            pieces.forEach((piece, i) => {
                const p = this.add.text(250 + i * 70, 280, piece, {
                    fontSize: '36px',
                    color: '#ffffff'
                }).setOrigin(0.5);
                
                this.tweens.add({
                    targets: p,
                    y: 270,
                    duration: 1000 + i * 200,
                    yoyo: true,
                    repeat: -1,
                    ease: 'Sine.easeInOut'
                });
            });

            const playBtn = this.add.text(400, 380, '[ JOGAR ]', {
                fontSize: '28px',
                color: '#4ecca3',
                fontFamily: 'Courier New',
                fontStyle: 'bold',
                padding: { x: 40, y: 15 }
            }).setOrigin(0.5).setInteractive();

            playBtn.on('pointerover', () => {
                playBtn.setColor('#ffffff');
                this.tweens.add({
                    targets: playBtn,
                    scale: 1.1,
                    duration: 150
                });
            });
            playBtn.on('pointerout', () => {
                playBtn.setColor('#4ecca3');
                playBtn.setScale(1);
            });
            playBtn.on('pointerdown', () => {
                this.cameras.main.fadeOut(500, 0, 0, 0);
                this.time.delayedCall(500, () => {
                    this.scene.start('GameScene');
                });
            });

            this.add.text(400, 470, '• Selecione peças do deck\n• Coloque no tabuleiro 6x6\n• Mova e capture o Rei inimigo\n• Use Coringas para efeitos especiais', {
                fontSize: '12px',
                color: '#95a5a6',
                fontFamily: 'Courier New',
                align: 'center',
                lineSpacing: 6
            }).setOrigin(0.5);

            this.add.text(400, 570, 'v1.0 - Phaser 3', {
                fontSize: '10px',
                color: '#34495e',
                fontFamily: 'Courier New'
            }).setOrigin(0.5);

            this.cameras.main.fadeIn(500, 0, 0, 0);

            this.tweens.add({
                targets: title,
                scale: 1.05,
                duration: 1500,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });
        }
    }

    const config = {
        type: Phaser.AUTO,
        width: 960,
        height: 700,
        parent: 'game-container',
        backgroundColor: '#0f0f23',
        scene: [MenuScene, GameScene],
        pixelArt: true,
        render: {
            antialias: false,
            pixelArt: true,
            roundPixels: true
        }
    };

    const game = new Phaser.Game(config);
    </script>
</body>
